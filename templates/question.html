<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
</head>
<body>
    <header>
        <progress value="{{ progress }}" max="100"></progress>
    </header>
    <main>
        <h1>{{ question }}</h1>
        {% if description %}<div style="background:#f9f9f9;padding:1rem;border-left:4px solid #0076d1;">{{ description | safe }}</div>{% endif %}
        {% if not is_result %}
            {% for opt in options %}
                <a href="{{ url_for('select_option', current_id=q_id, next_id=opt.next_id, choice_text=opt.text) }}">
                    <button style="width:100%;text-align:left;margin-bottom:10px;">{{ opt.text }}</button>
                </a>
            {% endfor %}
        {% else %}
            <p>✅ <strong>Complete.</strong> Result reached.</p>
        {% endif %}
    </main>
    <footer>
        {% if step > 1 %}<a href="{{ url_for('go_back') }}"><button style="background:#666;">Back</button></a>{% endif %}
        <a href="{{ url_for('index') }}"><button style="background:#a00;">Restart</button></a>
    </footer>
</body>
</html>
