<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script>mermaid.initialize({ startOnLoad: true });</script>
</head>
<body>
    <h1>Workflow Map</h1>
    <div class="mermaid" style="background:white;padding:20px;border:1px solid #ddd;border-radius:10px;">
        {{ flowchart }}
    </div>
    <hr>
    {% if broken_links %}
        <div style="background:#ffecec;color:#e00;padding:10px;border:1px solid #e00;">
            <strong>Errors:</strong> <ul>{% for b in broken_links %}<li>{{ b }}</li>{% endfor %}</ul>
        </div>
    {% endif %}
    <div style="display:flex;gap:10px;margin:20px 0;">
        <a href="{{ url_for('edit_question') }}"><button style="background:green;">+ New Step</button></a>
        <a href="{{ url_for('index') }}"><button style="background:#444;">Live Site</button></a>
    </div>
    <table>
        <thead><tr><th>ID</th><th>Text</th><th>Actions</th></tr></thead>
        <tbody>
            {% for id, d in questions.items() %}
            <tr>
                <td><code>{{ id }}</code></td>
                <td>{{ d.text }}</td>
                <td>
                    <a href="{{ url_for('edit_question', q_id=id) }}">Edit</a> | 
                    <a href="{{ url_for('clone_question', q_id=id) }}">Clone</a> | 
                    <a href="{{ url_for('delete_question', q_id=id) }}" style="color:red">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
